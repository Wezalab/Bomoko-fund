# VITE_LLM_PROVIDER is a non-secret toggle (e.g. groq vs chatgpt). Marking it as a
# secret in Netlify causes false positives when the same strings appear in code/docs.
[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "VITE_LLM_PROVIDER"

# Allow Google OAuth popup to communicate back via window.postMessage
[[headers]]
  for = "/*"
  [headers.values]
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Embedder-Policy = "unsafe-none"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200